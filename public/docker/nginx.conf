upstream php {
    server apppub:9000;
}

server {
    #listen              443 ssl;
    #server_name         localhost;
    #ssl_certificate     /etc/nginx/localhost.crt;
    #ssl_certificate_key /etc/nginx/localhost.key;
    #ssl_protocols       TLSv1 TLSv1.1 TLSv1.2;
    #ssl_ciphers         HIGH:!aNULL:!MD5;

    listen 80;
    index index.php index.html;
    server_name localhost;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/html/webpublic/public;
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ ^/assets/ {
        try_files $uri @assets;
    }

    location @assets {
        rewrite ^(/assets/.*?)\.([0-9]+)\.(js|jpg|png|jpeg|gif|css)$ $1.$3 last;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param SSL_CLIENT_VERIFY $ssl_client_verify;
        fastcgi_param SSL_CLIENT_M_SERIAL $ssl_client_serial;
        fastcgi_param SSL_CLIENT_CERTIFICATE $ssl_client_cert;
    }

    ssl_verify_client optional_no_ca;

    location /sendfile {
        internal;
        alias /shared/sendfile;
    }
}
