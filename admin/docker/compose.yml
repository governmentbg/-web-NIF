name: webadmin

volumes:
    shared:

services:
    web:
        image: nginx:latest
        ports:
            - "8080:80"
        volumes:
            - ./../public/:/var/www/html/webadmin/public/
            - shared:/shared:ro
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
    app:
        build:
            dockerfile: php.dockerfile
        environment:
            DATABASE: "postgre://${USER}@host.docker.internal/webadmin?schema=public&persist=1"
            LOG: syslog
        volumes:
            - ./../:/var/www/html/webadmin/
            - shared:/shared
            - ./.env.php:/var/www/html/webadmin/.env.php
            - ./.env:/var/www/html/webadmin/.env:ro
        entrypoint: sh -c "cd /var/www/html/webadmin/ && php ./scripts/run.php permissions && php-fpm"
        depends_on:
            - cache
    cache:
        image: memcached:latest
